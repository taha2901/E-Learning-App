name: e_learning
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.4
  dartz: ^0.10.1
  supabase_flutter: ^2.12.0
  equatable: ^2.0.8
  image_picker: ^1.2.1
  chewie: ^1.13.0
  video_player: ^2.11.0
  pdf: ^3.11.3
  printing: ^5.14.2
  intl: ^0.20.2
  share_plus: ^12.0.1
  audioplayers: ^6.6.0
  youtube_player_flutter: ^9.1.3

  # ── Splash & Launcher Icon ──────────────────────────────────────
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  youtube_explode_dart: ^3.0.5
  bloc: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# ── Splash Screen Config ────────────────────────────────────────────
flutter_native_splash:
  color: "#4A3FDC"
  image: assets/icons/app_icon.png
  android_12:
    color: "#4A3FDC"
    image: assets/icons/app_icon.png
  ios: true
  android: true
  web: false

# ── Launcher Icon Config ────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

  # Android adaptive icon (API 26+)
  # الـ background بنفسجي زي التطبيق، الـ foreground هو الأيقونة
  adaptive_icon_background: "#4A3FDC"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21

  # iOS — rounded corners بتتعمل أوتوماتيك من iOS نفسه
  # لكن لو عايز تتحكم في الشكل يدوياً:
  remove_alpha_ios: true

  # Web (اختياري)
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700